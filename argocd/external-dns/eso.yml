---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      version: v2
      path: secret
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-dns
          secretRef:
            name: external-dns-sa
            key: token

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-dns
spec:
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: external-dns
  data:
  - secretKey: aws_access_key_id
    remoteRef:
      key: secret/external-dns
      property: aws_access_key_id
  - secretKey: aws_secret_access_key
    remoteRef:
      key: secret/external-dns
      property: aws_secret_access_key
  refreshInterval: 1h